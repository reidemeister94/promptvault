name: Bug Report
description: Report a bug in promptvault
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `promptvault-sync`
        2. ...
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 15.3, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g., 3.12.1"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: promptvault version
      placeholder: "e.g., 0.1.0 (run: python -c 'import promptvault; print(promptvault.__version__)')"
    validations:
      required: false
