<svg viewBox="0 0 960 780" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','Fira Code','Cascadia Code',Menlo,Monaco,monospace" font-size="13">
  <defs>
    <linearGradient id="titlebar-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <clipPath id="terminal-clip">
      <rect x="0" y="0" width="960" height="780" rx="10"/>
    </clipPath>
  </defs>

  <!-- Window frame -->
  <rect width="960" height="780" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="960" height="32" rx="10" fill="url(#titlebar-bg)"/>
  <rect x="0" y="22" width="960" height="10" fill="url(#titlebar-bg)"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="480" y="20" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold">promptvault</text>

  <g clip-path="url(#terminal-clip)">
  <g transform="translate(16, 44)" fill="#cdd6f4" font-size="13">

    <!-- Shell prompt -->
    <text y="14"><tspan fill="#6c7086">~/projects/</tspan><tspan fill="#b4befe" font-weight="bold">myapp</tspan><tspan fill="#6c7086"> main</tspan><tspan fill="#585b70"> &gt; </tspan><tspan fill="#a6e3a1">pv</tspan></text>
    <text y="32" fill="#6c7086">Syncing... done.</text>

    <!-- Input section border (rounded top) -->
    <rect x="4" y="46" width="920" height="1" fill="#585b70"/>
    <path d="M4,47 Q4,46 5,46 L919,46 Q920,46 920,47 L920,99 L4,99 Z" fill="none" stroke="#585b70" stroke-width="1"/>
    <!-- Input label -->
    <text x="350" y="44" fill="#a6adc8" font-size="11"> 156 conversations </text>

    <!-- FZF input area -->
    <g transform="translate(14, 52)">
      <!-- Search line -->
      <text y="14"><tspan fill="#b4befe">conv&gt; </tspan><tspan fill="#cdd6f4">docker networking</tspan></text>
      <text y="32" fill="#6c7086">  8/156 (0)</text>
    </g>

    <!-- Input border bottom -->
    <rect x="4" y="98" width="920" height="1" fill="#585b70"/>

    <!-- Result list area — fixed x positions for pixel-perfect column alignment -->
    <!-- Columns: star@0, date@20, count@112, project@148, title@290 -->
    <g transform="translate(14, 108)">
      <!-- Selected row (highlighted) -->
      <rect x="-6" y="-4" width="904" height="20" fill="#45475a" rx="1"/>
      <text y="12">
        <tspan x="0" fill="#a6e3a1">★</tspan>
        <tspan x="20" fill="#6c7086">03-25 14:30</tspan>
        <tspan x="112" fill="#6c7086">8p</tspan>
        <tspan x="148" fill="#b4befe">my-webapp</tspan>
        <tspan x="290" fill="#cdd6f4">Set up </tspan><tspan fill="#fab387" font-weight="bold">docker networking</tspan><tspan fill="#cdd6f4"> for</tspan>
      </text>

      <!-- Conversation rows with alternating bg -->
      <rect x="-6" y="18" width="904" height="18" fill="#313244" rx="0"/>
      <text y="30">
        <tspan x="20" fill="#6c7086">03-25 10:15</tspan>
        <tspan x="112" fill="#6c7086">3p</tspan>
        <tspan x="148" fill="#b4befe">my-webapp</tspan>
        <tspan x="290" fill="#cdd6f4">Debug </tspan><tspan fill="#cba6f7">docker</tspan><tspan fill="#cdd6f4"> compose ports</tspan>
      </text>
      <text y="50">
        <tspan x="20" fill="#6c7086">03-24 22:40</tspan>
        <tspan x="112" fill="#6c7086">12p</tspan>
        <tspan x="148" fill="#b4befe">infra</tspan>
        <tspan x="290" fill="#cdd6f4">Migrate to </tspan><tspan fill="#cba6f7">docker</tspan><tspan fill="#cdd6f4"> swarm</tspan>
      </text>
      <rect x="-6" y="54" width="904" height="18" fill="#313244" rx="0"/>
      <text y="68">
        <tspan x="20" fill="#6c7086">03-24 16:05</tspan>
        <tspan x="112" fill="#6c7086">5p</tspan>
        <tspan x="148" fill="#b4befe">my-webapp</tspan>
        <tspan x="290" fill="#cdd6f4"><tspan fill="#cba6f7">Docker</tspan> healthcheck not working</tspan>
      </text>
      <text y="86">
        <tspan x="0" fill="#a6e3a1">★</tspan>
        <tspan x="20" fill="#6c7086">03-23 11:20</tspan>
        <tspan x="112" fill="#6c7086">2p</tspan>
        <tspan x="148" fill="#b4befe">~</tspan>
        <tspan x="290" fill="#cdd6f4">How does </tspan><tspan fill="#cba6f7">docker networking</tspan><tspan fill="#cdd6f4"> work</tspan>
      </text>
      <rect x="-6" y="90" width="904" height="18" fill="#313244" rx="0"/>
      <text y="104">
        <tspan x="20" fill="#6c7086">03-22 09:45</tspan>
        <tspan x="112" fill="#6c7086">7p</tspan>
        <tspan x="148" fill="#b4befe">backend-api</tspan>
        <tspan x="290" fill="#cdd6f4">Add </tspan><tspan fill="#cba6f7">docker</tspan><tspan fill="#cdd6f4"> support to CI</tspan>
      </text>
      <text y="122">
        <tspan x="20" fill="#6c7086">03-21 17:30</tspan>
        <tspan x="112" fill="#6c7086">4p</tspan>
        <tspan x="148" fill="#b4befe">infra</tspan>
        <tspan x="290" fill="#cdd6f4"><tspan fill="#cba6f7">Docker</tspan> registry auth setup</tspan>
      </text>
      <rect x="-6" y="126" width="904" height="18" fill="#313244" rx="0"/>
      <text y="140">
        <tspan x="20" fill="#6c7086">03-20 14:10</tspan>
        <tspan x="112" fill="#6c7086">15p</tspan>
        <tspan x="148" fill="#b4befe">my-webapp</tspan>
        <tspan x="290" fill="#cdd6f4">Containerize the app with</tspan>
      </text>
    </g>

    <!-- Footer (keybinding hints with · separators) -->
    <g transform="translate(14, 268)">
      <text y="0" fill="#6c7086" font-size="12">^t mode · ^p proj · ^d date · ^b ★fav · ^g show★</text>
      <text y="16" fill="#6c7086" font-size="12">^o open · ^y copy · ^e export · ^x excl · ^/ prev · esc</text>
    </g>

    <!-- Preview separator line -->
    <line x1="4" y1="300" x2="924" y2="300" stroke="#585b70" stroke-width="1"/>
    <!-- Preview label -->
    <text x="440" y="298" fill="#a6adc8" font-size="11"> Preview </text>

    <!-- Preview content -->
    <g transform="translate(14, 316)">
      <!-- Title -->
      <text y="14" fill="#cdd6f4" font-weight="bold" font-size="14"># Set up docker networking for the staging environment</text>
      <text y="34" fill="#6c7086">
        <tspan font-weight="bold">**Project:**</tspan>
        <tspan fill="#a6adc8"> my-webapp  </tspan>
        <tspan font-weight="bold">**Duration:**</tspan>
        <tspan fill="#a6adc8"> 45 min  </tspan>
        <tspan font-weight="bold">**Prompts:**</tspan>
        <tspan fill="#a6adc8"> 8</tspan>
      </text>

      <!-- Separator -->
      <line x1="0" y1="46" x2="900" y2="46" stroke="#585b70" stroke-width="1"/>

      <!-- Prompt 1 -->
      <text y="70" fill="#cba6f7" font-weight="bold">## Prompt 1 — 14:30:12</text>
      <text y="94" fill="#cdd6f4">I need to set up <tspan font-weight="bold" fill="#fab387">docker networking</tspan> between three containers: a postgres</text>
      <text y="112" fill="#cdd6f4">database, a redis cache, and my node.js API. They should be on the same</text>
      <text y="130" fill="#cdd6f4">network but postgres should not be reachable from outside.</text>

      <!-- Prompt 2 -->
      <text y="162" fill="#cba6f7" font-weight="bold">## Prompt 2 — 14:35:48</text>
      <text y="186" fill="#cdd6f4">The compose file works but the API container can't resolve the postgres</text>
      <text y="204" fill="#cdd6f4">hostname. I'm getting ECONNREFUSED. Here's my docker-compose.yml:</text>

      <!-- Prompt 3 -->
      <text y="236" fill="#cba6f7" font-weight="bold">## Prompt 3 — 14:42:15</text>
      <text y="260" fill="#cdd6f4">Now I want to add a reverse proxy with nginx. How do I configure the</text>
      <text y="278" fill="#cdd6f4"><tspan font-weight="bold" fill="#fab387">docker network</tspan> so nginx can reach the API but not the database directly?</text>
    </g>

  </g>
  </g>
</svg>
